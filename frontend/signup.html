<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Sign Up | Colaborator</title>
    <meta name="description" content="Sign up as a farmer to access crop suggestions and market demand insights.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    
    <div class="auth-container">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join the agricultural revolution</p>
            </div>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="farm-name">Farm Name / Location</label>
                    <input type="text" id="farm-name" class="form-control" placeholder="Green Valley Farms" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="farmer@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>
    
    <script src="js/main.js"></script>
</body>
</html>
