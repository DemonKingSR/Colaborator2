<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Sign Up | Colaborator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-blob blob-1" style="background: rgba(168, 85, 247, 0.4);"></div>
    <div class="bg-blob blob-2" style="background: rgba(236, 72, 153, 0.3);"></div>
    
    <div class="auth-container">
        <div class="glass-panel auth-card">
            <div class="auth-header">
                <h1>Community Sign Up</h1>
                <p>Join your local community network</p>
            </div>
            
            <form id="resident-signup-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" class="form-control" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="community-name">Community / Apartment Name</label>
                    <input type="text" id="community-name" class="form-control" placeholder="Sunrise Apartments" required>
                </div>
                <div class="form-group">
                    <label for="unit-number">Unit / Door Number</label>
                    <input type="text" id="unit-number" class="form-control" placeholder="Apt 4B" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="resident@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-primary" style="background: linear-gradient(135deg, #a855f7, #ec4899); box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);">Join Community</button>
            </form>
            
            <div class="auth-footer">
                Already registered? <a href="resident-login.html" style="color: #c084fc;">Sign In</a>
            </div>
            <div class="auth-footer" style="margin-top: 1rem;">
                Are you a farmer? <a href="signup.html">Farmer Sign Up</a>
            </div>
        </div>
    </div>
    
    <script src="js/community.js"></script>
</body>
</html>
